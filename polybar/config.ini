[bar/main]
width = 100%
height = 22
background = #222222
foreground = #dfdfdf

override-redirect = false
wm-restack = bspwm
bottom = false
padding-left = 1
padding-right = 1
module-margin = 1

font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = DejaVu Sans Mono:size=10;2

enable-ipc = true
modules-left = bspwm
modules-center = mpris-title mpris-prev mpris-toggle mpris-next
modules-right = pulseaudio battery date power

[module/bspwm]
type = internal/bspwm
label-focused = %name%
label-focused-background = #444444
label-focused-foreground = #ffffff
label-focused-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = #777777
label-empty-padding = 1

[module/power]
type = custom/text
content = ⏻
click-left = ~/.config/rofi/scripts/powermenu.sh
format-padding = 2
format-background = #333333
format-foreground = #ffffff
format-radius = 6

[module/mpris-title]
type = custom/script
exec = playerctl metadata --format '{{ artist }} - {{ title }}' 2>/dev/null || echo ""
interval = 1
format = <label>
label = %output%
label-maxlen = 45
format-background = #222222
format-padding = 2

[module/mpris-prev]
type = custom/text
content = " < "
click-left = playerctl previous
format-background = #333333
format-foreground = #aaaaaa
format-padding = 1

[module/mpris-toggle]
type = custom/script
exec = ~/.config/polybar/scripts/mpris-toggle.sh
interval = 1
click-left = playerctl play-pause
format-background = #444444
format-foreground = #ffffff
format-padding = 1

[module/mpris-next]
type = custom/text
content = " > "
click-left = playerctl next
format-background = #333333
format-foreground = #aaaaaa
format-padding = 1

[module/date]
type = internal/date
interval = 1
date = %H:%M

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false

format-volume = VOL <label-volume>
label-volume = %percentage%%

format-muted = MUTE

enable-scroll = true

scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5% && polybar-msg hook pulseaudio 1
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5% && polybar-msg hook pulseaudio 1

click-left = pavucontrol
click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0

full-at = 98

format-charging = CHG <label-charging>
format-discharging = BAT <label-discharging>
format-full = FULL

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 100%
